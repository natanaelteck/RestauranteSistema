<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RestauraMix — Pedidos</title>
<style>
  :root {
    --bg: #111318;
    --surface: #1a1d24;
    --surface2: #22262f;
    --border: #2e323d;
    --accent: #f5a623;
    --accent2: #e05c2a;
    --green: #2dcc7a;
    --red: #e04444;
    --blue: #4a90e2;
    --text: #eaeaea;
    --muted: #7a7f8e;
    --radius: 14px;
    --radius-sm: 8px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 1.1rem;
  }
  .nav-brand span.dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:.5; transform:scale(1.3); }
  }
  .nav-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: .78rem;
    color: var(--muted);
  }
  .nav-tag strong { color: var(--accent); }

  /* MAIN LAYOUT */
  main {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 0;
    flex: 1;
  }

  /* SIDEBAR — MESAS */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    height: calc(100vh - 60px);
    overflow-y: auto;
    position: sticky;
    top: 60px;
  }
  aside h2 {
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .mesa-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .mesa-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 8px;
    cursor: pointer;
    text-align: center;
    transition: all .2s;
    position: relative;
  }
  .mesa-btn:hover { border-color: var(--accent); }
  .mesa-btn.active {
    border-color: var(--accent);
    background: rgba(245,166,35,.08);
  }
  .mesa-btn .mesa-num {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    display: block;
  }
  .mesa-btn .mesa-label {
    font-size: .68rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .mesa-badge {
    position: absolute;
    top: -6px; right: -6px;
    background: var(--accent2);
    color: #fff;
    font-size: .6rem;
    font-weight: 700;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--bg);
  }

  /* PAINEL PRINCIPAL */
  .panel {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    height: calc(100vh - 60px);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-header h1 {
    font-size: 1.4rem;
    font-weight: 700;
  }
  .panel-header h1 span { color: var(--accent); }

  /* FORM PEDIDO */
  .order-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .order-form h3 {
    font-size: .85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .form-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 160px;
  }
  .field label {
    font-size: .78rem;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .field input, .field select, .field textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--font);
    font-size: .9rem;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field select option { background: var(--surface2); }
  .field textarea { resize: vertical; min-height: 64px; }

  /* PRIORIDADE */
  .priority-row {
    display: flex;
    gap: 8px;
  }
  .prio-btn {
    flex: 1;
    padding: 9px 6px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all .2s;
  }
  .prio-btn[data-prio="normal"].sel { border-color: var(--green); color: var(--green); background: rgba(45,204,122,.08); }
  .prio-btn[data-prio="alta"].sel { border-color: var(--accent); color: var(--accent); background: rgba(245,166,35,.08); }
  .prio-btn[data-prio="urgente"].sel { border-color: var(--red); color: var(--red); background: rgba(224,68,68,.1); }

  /* ITENS DO PEDIDO */
  .items-builder {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .item-entry {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .item-entry input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--font);
    font-size: .88rem;
    outline: none;
    transition: border-color .2s;
  }
  .item-entry input:focus { border-color: var(--accent); }
  .item-name { flex: 1; }
  .item-qty { width: 64px; text-align: center; }
  .btn-remove {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    width: 34px; height: 34px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .btn-remove:hover { border-color: var(--red); color: var(--red); }
  .btn-add-item {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    padding: 9px;
    cursor: pointer;
    font-size: .85rem;
    transition: all .2s;
    text-align: center;
  }
  .btn-add-item:hover { border-color: var(--accent); color: var(--accent); }

  /* BOTÕES */
  .btn-primary {
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 24px;
    font-weight: 700;
    font-size: .95rem;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary:hover { background: #f0b84a; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  /* LISTA DE PEDIDOS DA MESA */
  .mesa-orders {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .mesa-orders-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .mesa-orders-header h3 {
    font-size: .85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .order-count {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: .75rem;
    color: var(--muted);
  }
  .order-list {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
  }
  .order-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color .2s;
    position: relative;
    overflow: hidden;
  }
  .order-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .order-card[data-prio="normal"]::before { background: var(--green); }
  .order-card[data-prio="alta"]::before { background: var(--accent); }
  .order-card[data-prio="urgente"]::before { background: var(--red); }

  .order-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .order-id { font-size: .75rem; color: var(--muted); font-weight: 600; }
  .order-time { font-size: .72rem; color: var(--muted); }
  .prio-tag {
    border-radius: 20px;
    padding: 2px 10px;
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .prio-tag.normal { background: rgba(45,204,122,.12); color: var(--green); }
  .prio-tag.alta { background: rgba(245,166,35,.12); color: var(--accent); }
  .prio-tag.urgente { background: rgba(224,68,68,.12); color: var(--red); }
  .status-tag {
    border-radius: 20px;
    padding: 2px 10px;
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .status-tag.aguardando { border-color: var(--muted); color: var(--muted); }
  .status-tag.preparando { border-color: var(--blue); color: var(--blue); }
  .status-tag.pronto { border-color: var(--green); color: var(--green); }
  .order-items-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .order-item-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: .78rem;
    color: var(--text);
  }
  .order-item-chip span { color: var(--accent); font-weight: 700; }
  .order-obs {
    font-size: .78rem;
    color: var(--muted);
    font-style: italic;
  }
  .order-actions {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }
  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    padding: 5px 12px;
    font-size: .78rem;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-cancel:hover { border-color: var(--red); color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: .88rem;
  }
  .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 18px;
    font-size: .88rem;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 280px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast .toast-icon { font-size: 1.1rem; }

  /* MESA VAZIA */
  .select-prompt {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    flex-direction: column;
    gap: 12px;
    color: var(--muted);
    height: 100%;
  }
  .select-prompt .big { font-size: 3rem; }
  .select-prompt h2 { font-size: 1.1rem; font-weight: 600; color: var(--text); }
  .select-prompt p { font-size: .85rem; }

  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; }
    aside { height: auto; position: static; flex-direction: row; flex-wrap: wrap; overflow-x: auto; padding: 12px; }
    .mesa-grid { display: flex; flex-wrap: nowrap; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    🍽️ RestauraMix
    <span class="dot"></span>
  </div>
  <div class="nav-tag">Garçom &mdash; <strong id="nav-mesa">Nenhuma mesa</strong></div>
</nav>

<main>
  <!-- MESAS -->
  <aside>
    <h2>Mesas</h2>
    <div class="mesa-grid" id="mesa-grid"></div>
  </aside>

  <!-- PAINEL PEDIDOS -->
  <div class="panel" id="panel">
    <div class="select-prompt" id="select-prompt">
      <div class="big">🪑</div>
      <h2>Selecione uma mesa</h2>
      <p>Clique em uma mesa ao lado para começar os pedidos</p>
    </div>
  </div>
</main>

<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon">✅</span>
  <span id="toast-msg">Pedido enviado!</span>
</div>

<script>
  // ─── STATE ───────────────────────────────────────────────────────────
  const TOTAL_MESAS = 12;
  const STORAGE_KEY = 'restauramix_orders';
  let mesaAtiva = null;
  let prioSel = 'normal';
  let itemsList = [];
  let toastTimer = null;

  // ─── CANAL DE COMUNICAÇÃO ────────────────────────────────────────────
  const channel = new BroadcastChannel('restauramix');

  function loadOrders() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function saveOrders(orders) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
    channel.postMessage({ type: 'UPDATE' });
  }

  // ─── UTILITÁRIOS ─────────────────────────────────────────────────────
  function genId() {
    return '#' + Math.random().toString(36).slice(2,7).toUpperCase();
  }
  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }
  function showToast(msg, icon = '✅') {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    document.getElementById('toast-icon').textContent = icon;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ─── MESAS ───────────────────────────────────────────────────────────
  function renderMesas() {
    const orders = loadOrders();
    const grid = document.getElementById('mesa-grid');
    grid.innerHTML = '';
    for (let i = 1; i <= TOTAL_MESAS; i++) {
      const count = orders.filter(o => o.mesa === i && o.status !== 'cancelado').length;
      const btn = document.createElement('button');
      btn.className = 'mesa-btn' + (mesaAtiva === i ? ' active' : '');
      btn.innerHTML = `
        <span class="mesa-num">Mesa ${i}</span>
        <span class="mesa-label">${count > 0 ? count + ' pedido' + (count > 1 ? 's' : '') : 'livre'}</span>
        ${count > 0 ? `<span class="mesa-badge">${count}</span>` : ''}
      `;
      btn.onclick = () => selectMesa(i);
      grid.appendChild(btn);
    }
  }

  function selectMesa(n) {
    mesaAtiva = n;
    document.getElementById('nav-mesa').textContent = `Mesa ${n}`;
    renderMesas();
    renderPanel();
  }

  // ─── PAINEL ──────────────────────────────────────────────────────────
  function renderPanel() {
    const panel = document.getElementById('panel');
    const prompt = document.getElementById('select-prompt');
    if (!mesaAtiva) {
      panel.innerHTML = `
        <div class="select-prompt">
          <div class="big">🪑</div>
          <h2>Selecione uma mesa</h2>
          <p>Clique em uma mesa ao lado para começar os pedidos</p>
        </div>`;
      return;
    }
    prioSel = 'normal';
    itemsList = [{ name: '', qty: 1 }];
    panel.innerHTML = buildPanelHTML();
    bindPanelEvents();
    renderOrdersList();
  }

  function buildPanelHTML() {
    return `
      <div class="panel-header">
        <h1>Mesa <span>${mesaAtiva}</span></h1>
      </div>

      <!-- FORMULÁRIO -->
      <div class="order-form">
        <h3>Novo Pedido</h3>
        
        <div class="form-row">
          <div class="field">
            <label>Prioridade</label>
            <div class="priority-row" id="prio-row">
              <button class="prio-btn sel" data-prio="normal">🟢 Normal</button>
              <button class="prio-btn" data-prio="alta">🟡 Alta</button>
              <button class="prio-btn" data-prio="urgente">🔴 Urgente</button>
            </div>
          </div>
        </div>

        <div class="field">
          <label>Itens do Pedido</label>
          <div class="items-builder" id="items-builder"></div>
          <button class="btn-add-item" id="btn-add-item">+ Adicionar item</button>
        </div>

        <div class="field">
          <label>Observações</label>
          <textarea id="obs-input" placeholder="Ex: sem cebola, bem passado..."></textarea>
        </div>

        <div>
          <button class="btn-primary" id="btn-submit">
            🚀 Enviar para Cozinha
          </button>
        </div>
      </div>

      <!-- PEDIDOS DA MESA -->
      <div class="mesa-orders">
        <div class="mesa-orders-header">
          <h3>Pedidos da Mesa ${mesaAtiva}</h3>
          <span class="order-count" id="order-count">0 pedidos</span>
        </div>
        <div class="order-list" id="order-list"></div>
      </div>
    `;
  }

  function renderItemsBuilder() {
    const builder = document.getElementById('items-builder');
    if (!builder) return;
    builder.innerHTML = '';
    itemsList.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = 'item-entry';
      row.innerHTML = `
        <input type="text" class="item-name" placeholder="Ex: X-Burguer, Suco de Laranja..." value="${item.name}" data-idx="${idx}">
        <input type="number" class="item-qty" min="1" max="99" value="${item.qty}" data-idx="${idx}">
        <button class="btn-remove" data-idx="${idx}" title="Remover">✕</button>
      `;
      builder.appendChild(row);
    });
    // bind inputs
    builder.querySelectorAll('.item-name').forEach(inp => {
      inp.addEventListener('input', e => {
        itemsList[+e.target.dataset.idx].name = e.target.value;
      });
    });
    builder.querySelectorAll('.item-qty').forEach(inp => {
      inp.addEventListener('change', e => {
        itemsList[+e.target.dataset.idx].qty = Math.max(1, +e.target.value);
      });
    });
    builder.querySelectorAll('.btn-remove').forEach(btn => {
      btn.addEventListener('click', e => {
        const idx = +e.target.dataset.idx;
        if (itemsList.length > 1) {
          itemsList.splice(idx, 1);
          renderItemsBuilder();
        }
      });
    });
  }

  function bindPanelEvents() {
    // prioridade
    document.querySelectorAll('.prio-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.prio-btn').forEach(b => b.classList.remove('sel'));
        btn.classList.add('sel');
        prioSel = btn.dataset.prio;
      });
    });
    // itens
    renderItemsBuilder();
    document.getElementById('btn-add-item').addEventListener('click', () => {
      itemsList.push({ name: '', qty: 1 });
      renderItemsBuilder();
    });
    // submit
    document.getElementById('btn-submit').addEventListener('click', submitOrder);
  }

  function submitOrder() {
    const validItems = itemsList.filter(i => i.name.trim() !== '');
    if (validItems.length === 0) {
      showToast('Adicione ao menos 1 item!', '⚠️');
      return;
    }
    const obs = document.getElementById('obs-input').value.trim();
    const order = {
      id: genId(),
      mesa: mesaAtiva,
      items: validItems,
      prioridade: prioSel,
      obs,
      status: 'aguardando',
      ts: Date.now()
    };
    const orders = loadOrders();
    orders.push(order);
    saveOrders(orders);
    showToast(`Pedido ${order.id} enviado! 🍳`, '✅');
    // reset form
    itemsList = [{ name: '', qty: 1 }];
    prioSel = 'normal';
    document.querySelectorAll('.prio-btn').forEach(b => b.classList.remove('sel'));
    document.querySelector('.prio-btn[data-prio="normal"]').classList.add('sel');
    if (document.getElementById('obs-input')) document.getElementById('obs-input').value = '';
    renderItemsBuilder();
    renderMesas();
    renderOrdersList();
  }

  function renderOrdersList() {
    const list = document.getElementById('order-list');
    const count = document.getElementById('order-count');
    if (!list) return;
    const orders = loadOrders().filter(o => o.mesa === mesaAtiva && o.status !== 'cancelado');
    count.textContent = orders.length + ' pedido' + (orders.length !== 1 ? 's' : '');
    if (orders.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📋</div>Nenhum pedido nesta mesa ainda</div>`;
      return;
    }
    // sort: urgente first
    const sorted = [...orders].sort((a,b) => {
      const pmap = { urgente: 0, alta: 1, normal: 2 };
      return (pmap[a.prioridade] - pmap[b.prioridade]) || (a.ts - b.ts);
    });
    list.innerHTML = sorted.map(o => `
      <div class="order-card" data-prio="${o.prioridade}">
        <div class="order-card-top">
          <div style="display:flex;gap:6px;align-items:center">
            <span class="order-id">${o.id}</span>
            <span class="order-time">${formatTime(o.ts)}</span>
          </div>
          <div style="display:flex;gap:6px">
            <span class="prio-tag ${o.prioridade}">${o.prioridade}</span>
            <span class="status-tag ${o.status}">${o.status}</span>
          </div>
        </div>
        <div class="order-items-list">
          ${o.items.map(i => `<span class="order-item-chip"><span>${i.qty}x</span> ${i.name}</span>`).join('')}
        </div>
        ${o.obs ? `<div class="order-obs">💬 ${o.obs}</div>` : ''}
        <div class="order-actions">
          <button class="btn-cancel" onclick="cancelOrder('${o.id}')">Cancelar</button>
        </div>
      </div>
    `).join('');
  }

  function cancelOrder(id) {
    const orders = loadOrders();
    const order = orders.find(o => o.id === id);
    if (order) {
      order.status = 'cancelado';
      saveOrders(orders);
      showToast(`Pedido ${id} cancelado`, '🗑️');
      renderMesas();
      renderOrdersList();
    }
  }

  // Escuta updates da cozinha
  channel.onmessage = () => {
    renderMesas();
    renderOrdersList();
  };

  // Init
  renderMesas();
</script>
</body>
</html>
